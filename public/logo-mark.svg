<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Yantra">
  <title>Yantra — Instrument, Machine</title>
  <rect width="256" height="256" fill="#f1ebe1"/>
  <!-- Outer ring (the marketplace boundary) -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Sri-Yantra-inspired interlocking triangles: agents (down) + founders (up) meet in the middle -->
  <path d="M128 44  L218 196 L38 196 Z" fill="none" stroke="#c1502e" stroke-width="5" stroke-linejoin="miter"/>
  <path d="M128 212 L38 60   L218 60  Z" fill="none" stroke="#2a4942" stroke-width="5" stroke-linejoin="miter"/>
  <!-- Bindu (the deal point) -->
  <circle cx="128" cy="128" r="12" fill="#c89b27"/>
  <circle cx="128" cy="128" r="4"  fill="#1a1a1a"/>
</svg>
